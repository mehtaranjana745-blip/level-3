name: Deploy Contracts to Testnet
on:
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  deploy:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.81.0
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            contracts/target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli
      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Optimize contracts
        run: |
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/token.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/staking.wasm
      - name: Deploy to Testnet
        run: |
          echo "Generating identities..."
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet
          
          echo "Deploying Token Contract..."
          TOKEN_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/token.optimized.wasm \
            --source deployer \
            --network testnet 2>token_deploy_err.log) || { cat token_deploy_err.log; exit 1; }
          echo "Token Contract ID: $TOKEN_ID"
          
          echo "Deploying Staking Contract..."
          STAKING_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/staking.optimized.wasm \
            --source deployer \
            --network testnet 2>staking_deploy_err.log) || { cat staking_deploy_err.log; exit 1; }
          echo "Staking Contract ID: $STAKING_ID"
